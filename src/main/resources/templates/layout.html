<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE | EduTrack">EduTrack</title>
    <meta name="description" content="Online Course Enrollment and Progress Tracking System"/>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet"/>

    <style>
        :root {
            --primary:       #4f46e5;
            --primary-dark:  #3730a3;
            --primary-light: #818cf8;
            --accent:        #06b6d4;
            --success:       #10b981;
            --warning:       #f59e0b;
            --danger:        #ef4444;
            --bg-dark:       #0f172a;
            --bg-card:       #1e293b;
            --bg-card2:      #0f2040;
            --text-muted:    #94a3b8;
            --border:        rgba(255,255,255,0.08);
            --gradient-hero: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar-custom {
            background: linear-gradient(90deg, #1e1b4b 0%, #0c1a3a 100%);
            border-bottom: 1px solid var(--border);
            padding: 0.85rem 2rem;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .navbar-brand-text {
            font-size: 1.45rem; font-weight: 800; letter-spacing: -0.5px;
            background: var(--gradient-hero);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .navbar-brand-text span { font-weight: 300; }
        .nav-link-custom {
            color: #94a3b8 !important;
            font-weight: 500; font-size: 0.9rem;
            padding: 0.45rem 1rem !important;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-link-custom:hover, .nav-link-custom.active {
            color: #e2e8f0 !important;
            background: rgba(255,255,255,0.08);
        }
        .nav-link-custom.active {
            background: rgba(79,70,229,0.25);
            color: var(--primary-light) !important;
        }
        .btn-nav-add {
            background: var(--gradient-hero);
            color: #fff !important; border: none;
            font-weight: 600; font-size: 0.85rem;
            padding: 0.45rem 1.1rem !important;
            border-radius: 8px;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-nav-add:hover { opacity: 0.88; transform: translateY(-1px); }

        /* ── Content wrapper ── */
        .content-wrapper { padding: 2rem 2rem 4rem; max-width: 1500px; margin: 0 auto; }

        /* ── Cards ── */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* ── Alerts ── */
        .alert-success-custom {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.35);
            color: #6ee7b7; border-radius: 10px;
        }
        .alert-danger-custom {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5; border-radius: 10px;
        }

        /* ── Tables ── */
        .table-dark-custom { color: #e2e8f0; }
        .table-dark-custom thead th {
            background: rgba(79,70,229,0.25);
            color: var(--primary-light);
            font-weight: 600; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            padding: 0.85rem 1rem;
        }
        .table-dark-custom tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .table-dark-custom tbody tr:hover { background: rgba(255,255,255,0.04); }
        .table-dark-custom td {
            padding: 0.75rem 1rem;
            vertical-align: middle;
            font-size: 0.88rem;
        }

        /* ── Badges ── */
        .badge-completed  { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .badge-inprogress { background: rgba(245,158,11,0.2); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
        .badge-notstarted { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }
        .badge-eligible   { background: rgba(6,182,212,0.2);  color: #22d3ee; border: 1px solid rgba(6,182,212,0.3); }
        .badge-noteligible{ background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
        .badge-top        { background: rgba(251,191,36,0.2); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
        .badge-custom {
            border-radius: 20px; padding: 0.3em 0.8em;
            font-size: 0.75rem; font-weight: 600; white-space: nowrap;
        }

        /* ── Forms ── */
        .form-control-custom, .form-select-custom {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #e2e8f0; border-radius: 10px;
            padding: 0.55rem 0.9rem; font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control-custom:focus, .form-select-custom:focus {
            background: rgba(79,70,229,0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.2);
            color: #e2e8f0; outline: none;
        }
        .form-control-custom::placeholder { color: #64748b; }
        .form-select-custom option { background: #1e293b; color: #e2e8f0; }
        .form-label-custom {
            color: #94a3b8; font-size: 0.82rem;
            font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 0.4rem;
        }
        .form-control-custom.is-invalid, .form-select-custom.is-invalid {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
        }
        .invalid-feedback { color: #f87171; font-size: 0.8rem; }

        /* ── Buttons ── */
        .btn-primary-custom {
            background: var(--gradient-hero);
            border: none; color: #fff;
            font-weight: 600; border-radius: 10px;
            padding: 0.6rem 1.4rem;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-primary-custom:hover { opacity: 0.88; transform: translateY(-1px); color: #fff; }
        .btn-outline-custom {
            border: 1px solid var(--border); color: #94a3b8;
            background: transparent; border-radius: 10px;
            padding: 0.55rem 1.1rem;
            transition: all 0.2s;
        }
        .btn-outline-custom:hover {
            background: rgba(255,255,255,0.07);
            color: #e2e8f0; border-color: rgba(255,255,255,0.2);
        }
        .btn-danger-custom {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171; border-radius: 10px;
            padding: 0.4rem 0.85rem; font-size: 0.82rem;
            transition: all 0.2s;
        }
        .btn-danger-custom:hover { background: rgba(239,68,68,0.3); color: #fff; }
        .btn-view-custom {
            background: rgba(6,182,212,0.12);
            border: 1px solid rgba(6,182,212,0.25);
            color: #22d3ee; border-radius: 10px;
            padding: 0.4rem 0.85rem; font-size: 0.82rem;
            transition: all 0.2s;
        }
        .btn-view-custom:hover { background: rgba(6,182,212,0.28); color: #fff; }
        .btn-edit-custom {
            background: rgba(245,158,11,0.12);
            border: 1px solid rgba(245,158,11,0.25);
            color: #fcd34d; border-radius: 10px;
            padding: 0.4rem 0.85rem; font-size: 0.82rem;
            transition: all 0.2s;
        }
        .btn-edit-custom:hover { background: rgba(245,158,11,0.28); color: #fff; }

        /* ── Progress bar ── */
        .progress-custom {
            height: 8px; border-radius: 999px;
            background: rgba(255,255,255,0.08);
        }
        .progress-bar-custom {
            border-radius: 999px;
            background: linear-gradient(90deg, #4f46e5, #06b6d4);
            transition: width 0.6s ease;
        }

        /* ── Page header ── */
        .page-header {
            margin-bottom: 1.8rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid var(--border);
        }
        .page-title {
            font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px;
            background: var(--gradient-hero);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .page-subtitle { color: #64748b; font-size: 0.9rem; margin-top: 0.25rem; }

        /* ── Section title ── */
        .section-title {
            font-size: 1rem; font-weight: 700;
            color: #e2e8f0; letter-spacing: -0.2px;
        }

        /* ── Scrollable table wrapper ── */
        .table-responsive-custom {
            border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border);
        }

        /* ── Footer ── */
        footer {
            text-align: center; padding: 1.5rem;
            color: #334155; font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-custom navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand text-decoration-none" th:href="@{/enrollments}">
            <span class="navbar-brand-text">Edu<span>Track</span></span>
        </a>

        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav"
                style="color:#94a3b8">
            <i class="bi bi-list fs-4"></i>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-4 gap-1">
                <li class="nav-item">
                    <a class="nav-link-custom" th:href="@{/enrollments}"
                       th:classappend="${currentUri != null and currentUri.contains('/enrollments') and !currentUri.contains('/new') and !currentUri.contains('/edit') ? 'active' : ''}">
                        <i class="bi bi-table me-1"></i> Enrollments
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link-custom" th:href="@{/dashboard}"
                       th:classappend="${currentUri != null and currentUri.contains('/dashboard') ? 'active' : ''}">
                        <i class="bi bi-bar-chart-line me-1"></i> Analytics
                    </a>
                </li>
            </ul>
            <div class="ms-auto">
                <a class="nav-link-custom btn-nav-add" th:href="@{/enrollments/new}">
                    <i class="bi bi-plus-lg me-1"></i> Add Enrollment
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- ── Flash messages ── -->
<div class="content-wrapper" style="padding-bottom:0; padding-top:1rem">
    <div th:if="${successMessage}" class="alert alert-success-custom d-flex align-items-center gap-2 mb-0">
        <i class="bi bi-check-circle-fill fs-5"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger-custom d-flex align-items-center gap-2 mb-0">
        <i class="bi bi-exclamation-triangle-fill fs-5"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- ── Page Content ── -->
<div layout:fragment="content">
    <!-- page-specific content goes here -->
</div>

<footer>
    &copy; 2025 EduTrack &mdash; Online Course Enrollment &amp; Progress Tracking System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
